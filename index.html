<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infographic Chứng Chỉ Ngoại Ngữ 2026</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
        }
        .isometric-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        /* Tối ưu hiển thị cho iframe */
        #root { min-height: 100vh; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [selectedLang, setSelectedLang] = useState('English');
            const [searchTerm, setSearchTerm] = useState('');
            const [imageUrl, setImageUrl] = useState(null);
            const [isGenerating, setIsGenerating] = useState(true);

            const generateHeaderImage = async (retryCount = 0) => {
                const apiKey = ""; // API key được môi trường cung cấp tự động
                const prompt = "isometric 3D illustration of a friendly student studying languages, books, floating icons like 'ABC' and 'Hello', soft pastel blue and orange tones, clean white background, high quality digital art";
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            instances: { prompt: prompt },
                            parameters: { sampleCount: 1 }
                        })
                    });

                    if (!response.ok) throw new Error('Generation failed');
                    
                    const result = await response.json();
                    if (result.predictions && result.predictions[0]) {
                        const base64Data = result.predictions[0].bytesBase64Encoded;
                        setImageUrl(`data:image/png;base64,${base64Data}`);
                    }
                    setIsGenerating(false);
                } catch (error) {
                    if (retryCount < 5) {
                        const delay = Math.pow(2, retryCount) * 1000;
                        setTimeout(() => generateHeaderImage(retryCount + 1), delay);
                    } else {
                        setIsGenerating(false);
                        // Fallback image if AI generation fails
                        setImageUrl("https://illustrations.popsy.co/amber/studying.svg");
                    }
                }
            };

            useEffect(() => {
                generateHeaderImage();
            }, []);

            const languages = [
                { id: 'English', name: 'Tiếng Anh', icon: '🇬🇧' },
                { id: 'Russian', name: 'Tiếng Nga', icon: '🇷🇺' },
                { id: 'French', name: 'Tiếng Pháp', icon: '🇫🇷' },
                { id: 'Chinese', name: 'Tiếng Trung', icon: '🇨🇳' },
                { id: 'German', name: 'Tiếng Đức', icon: '🇩🇪' },
                { id: 'Japanese', name: 'Tiếng Nhật', icon: '🇯🇵' },
                { id: 'Korean', name: 'Tiếng Hàn', icon: '🇰🇷' },
            ];

            const certificateData = {
                English: [
                    { name: "TOEFL ITP", score: "450 điểm", provider: "Educational Testing Service (ETS)" },
                    { name: "TOEFL iBT", score: "45 điểm", provider: "Educational Testing Service (ETS)" },
                    { name: "TOEIC (4 kỹ năng)", score: "Nghe: 275;  Đọc: 275;  Nói: 120;  Viết: 120", provider: "Educational Testing Service (ETS)" },
                    { name: "IELTS", score: "4.0 điểm", provider: "British Council (BC); International Development
Program (IDP)" },
                    { name: "B1 Preliminary", score: "Đạt yêu cầu", provider: "Cambridge Assessment English; Cambridge University Press & Assessment" },
                    { name: "B1 Business Preliminary", score: "Đạt yêu cầu", provider: "Cambridge Assessment English; Cambridge University Press & Assessment" },
                    { name: "B1 Linguaskill", score: "Đạt yêu cầu", provider: "Cambridge Assessment English; Cambridge University Press & Assessment" },
                    { name: "Aptis ESOL B1", score: "Đạt yêu cầu", provider: "British Council (BC)" },
                    { name: "Pearson English International Certificate (PEIC)", score: " Level 2", provider: "Pearson" },
                    { name: "Pearson Test of English Academic (PTE Academic)", score: "43 điểm", provider: "Pearson" },
                    { name: "Versant English Placement Test (VEPT)", score: "43 điểm", provider: "Pearson" },
                    { name: "Chứng chỉ ngoại ngữ theo Khung năng lực ngoại ngữ 6 bậc dùng cho Việt Nam", score: "Đạt từ Bậc 3", provider: "Các đơn vị tổ chức thi theo quy chế thi đánh giá năng lực ngoại ngữ theo khung năng lực ngoại ngữ 6 bậc dùng cho Việt Nam hiện hành" }
                ],
                Russian: [
                    { name: "TORFL cấp độ 1", score: "(Первый сертификационный уровень - ТРКИ-1)", provider: "Trung tâm Khoa học và Văn hóa Nga tại Hà Nội (The Russian centre of science and culture in Hanoi)" }
                ],
                French: [
                    { name: "TCF", score: "300 điểm", provider: "Trung tâm Nghiên cứu Sư phạm quốc tế (Centre International d’Etudes Pedagogiques - CIEP); Cơ quan Giáo dục Quốc tế Pháp (France Education International - FEI)" },
                    { name: "DELF B1", score: "Đạt yêu cầu", provider: "Trung tâm Nghiên cứu Sư phạm quốc tế (Centre International d’Etudes Pedagogiques - CIEP); Cơ quan Giáo dục Quốc tế Pháp (France Education International - FEI)" }
                ],
                Chinese: [
                    { name: "HSK cấp độ 3", score: "Đạt yêu cầu", provider: "Văn phòng Hán ngữ đối ngoại Trung Quốc (Han Ban); Ủy ban Khảo thí trình độ Hán ngữ quốc gia (The National Committee for the Test of Proficiency in Chinese); Tổng bộ Viện Khổng tử (Trung Quốc); Trung tâm hợp tác giao lưu ngôn ngữ giữa Trung Quốc và nước ngoài (Center for Language Education and Cooperation)" },
                    { name: "TOCFL cấp độ 3", score: "Đạt yêu cầu", provider: "Ủy ban công tác thúc đẩy Kỳ thi đánh giá năng lực Hoa ngữ quốc gia (Steering Committee for the Test of Proficiency – Huayu)" }
                ],
                German: [
                    { name: "Goethe-Zertifikat B1", score: "Đạt yêu cầu", provider: "Viện Goethe (Goethe-Institut)" },
                    { name: "DSD cấp độ B1", score: "Đạt yêu cầu", provider: "Ủy ban giáo dục phổ thông Đức tại nước ngoài (ZfA)" }
                ],
                Japanese: [
                    { name: "JLPT cấp độ N3", score: "Đạt yêu cầu", provider: "Quỹ Giao lưu quốc tế Nhật Bản (Japan Foundation)" },
                    { name: "J.TEST cấp độ D", score: "Đạt yêu cầu", provider: "Công ty TNHH Gobun Kenkyusya(Gobun Kenkyusya Co., Ltd)" }
                ],
                Korean: [
                    { name: "TOPIK cấp độ 3", score: "Đạt yêu cầu", provider: "Viện Giáo dục Quốc tế Quốc gia Hàn Quốc" }
                ]
            };

            const filteredCerts = certificateData[selectedLang].filter(cert => 
                cert.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                cert.provider.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    <header className="mb-8 bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-10 relative overflow-hidden flex flex-col md:flex-row items-center justify-between gap-6">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-blue-50 rounded-full -mr-20 -mt-20 opacity-40 blur-3xl"></div>
                        
                        <div className="relative z-10 flex-1">
                            <div className="flex items-center gap-3 mb-4">
                                <span className="bg-blue-600 text-white text-xs font-bold px-3 py-1 rounded-full tracking-wider uppercase">Chính thức 2026</span>
                                <span className="flex items-center gap-1 text-slate-500 text-sm">
                                    <Icon name="calendar" size={14} /> Áp dụng từ 24/4/2026
                                </span>
                            </div>
                            <h1 className="text-3xl md:text-5xl font-extrabold text-slate-900 leading-tight mb-4">
                                Danh mục Chứng chỉ <br />
                                <span className="text-blue-600">Miễn thi Ngoại ngữ</span>
                            </h1>
                            <p className="text-slate-600 max-w-lg text-lg leading-relaxed">
                                Theo Thông tư <span className="font-semibold text-slate-800">13/2026/TT-BGDĐT</span>. Thí sinh có chứng chỉ đạt yêu cầu sẽ được tính điểm 10 môn Ngoại ngữ.
                            </p>
                        </div>

                        <div className="relative z-10 w-full md:w-1/3 flex justify-center md:justify-end">
                            {isGenerating ? (
                                <div className="w-48 h-48 bg-slate-50 rounded-2xl flex flex-col items-center justify-center gap-3 border border-slate-100">
                                    <div className="w-8 h-8 border-4 border-blue-600/20 border-t-blue-600 rounded-full animate-spin"></div>
                                    <span className="text-xs text-slate-400 font-medium">Đang tải minh họa...</span>
                                </div>
                            ) : imageUrl ? (
                                <img 
                                    src={imageUrl} 
                                    alt="Minh họa học tập" 
                                    className="w-48 md:w-64 h-auto drop-shadow-2xl isometric-float" 
                                />
                            ) : null}
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-4 space-y-4">
                            <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
                                <h2 className="text-sm font-semibold text-slate-500 uppercase tracking-widest px-2 mb-4 flex items-center gap-2">
                                    <Icon name="languages" size={16} /> Chọn Ngôn ngữ
                                </h2>
                                <div className="space-y-2">
                                    {languages.map((lang) => (
                                        <button
                                            key={lang.id}
                                            onClick={() => { setSelectedLang(lang.id); setSearchTerm(''); }}
                                            className={`w-full flex items-center justify-between p-4 rounded-xl transition-all duration-200 group ${
                                                selectedLang === lang.id 
                                                ? 'bg-blue-600 text-white shadow-md scale-[1.02]' 
                                                : 'bg-white hover:bg-slate-50 text-slate-700 border border-transparent hover:border-slate-200'
                                            }`}
                                        >
                                            <div className="flex items-center gap-4">
                                                <span className="text-2xl">{lang.icon}</span>
                                                <span className="font-bold">{lang.name}</span>
                                            </div>
                                            <Icon name="chevron-right" size={16} className={selectedLang === lang.id ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'} />
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-8 space-y-6">
                            <div className="relative">
                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                                    <Icon name="search" size={20} />
                                </div>
                                <input 
                                    type="text" 
                                    placeholder={`Tìm kiếm chứng chỉ ${languages.find(l => l.id === selectedLang).name}...`}
                                    className="w-full pl-12 pr-4 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-lg"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>

                            <div className="grid grid-cols-1 gap-4">
                                {filteredCerts.length > 0 ? (
                                    filteredCerts.map((cert, index) => (
                                        <div key={index} className="bg-white rounded-2xl border border-slate-200 p-6 hover:shadow-lg hover:border-blue-200 transition-all group">
                                            <div className="flex items-center gap-2 mb-2">
                                                <Icon name="check-circle-2" size={18} className="text-green-500 shrink-0" />
                                                <h3 className="text-xl font-bold text-slate-900 group-hover:text-blue-600 transition-colors">{cert.name}</h3>
                                            </div>
                                            <div className="bg-slate-100 px-3 py-1 rounded inline-block text-slate-600 border border-slate-200 mb-4 text-sm font-medium">
                                                Yêu cầu: <span className="text-blue-600 font-bold">{cert.score}</span>
                                            </div>
                                            <div className="flex items-start gap-2 text-sm text-slate-500 italic">
                                                <Icon name="file-text" size={16} className="mt-0.5 shrink-0" />
                                                <span>Đơn vị cấp: {cert.provider}</span>
                                            </div>
                                        </div>
                                    ))
                                ) : (
                                    <div className="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-200">
                                        <h3 className="text-slate-900 font-bold text-lg">Không tìm thấy chứng chỉ</h3>
                                        <p className="text-slate-500">Hãy thử từ khóa khác.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                    
                    <footer className="mt-12 text-center text-slate-400 text-sm py-8">
                        <p>Nguồn: Bộ Giáo dục và Đào tạo</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
