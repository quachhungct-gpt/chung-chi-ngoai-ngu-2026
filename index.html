/*Menu ngang*/
   #menungang{
   margin-top:10px;

      #menungang li{
   float:left;
   color:#fff;
   font-family:"Times New Roman", Times, serif;
   font-size:18px;
   font-weight:bold;
   border-right:#C93 solid 2px;
   background-color:#9c6;
   text-align:center;
   list-style-type:none;
   width: 200px;
   position:relative;
   }
         #menungang li:hover{
   color:#993399;
   cursor:pointer;
   }
		#menungang li ul{
			display:none;
			position:absolute;
			float:left;
			top:20px;			
		}
		#menungang li ul li{
			width:200px;
			border-bottom:#c00 solid 1px;
			padding-top:10px;
			padding-left:5px;
			text-align:left;
			background-color:#693;
		
		}
				#menungang li ul li:hover{
			cursor:pointer;
			color:#333333;
			background-color:#6c6;
			
		
		}
		#menungang li:hover ul,
		#menungang li li:hover ul,
		#menungang li li li:hover ul,
		#menungang li li li li:hover ul,
		display:none;
		}
		#menungang li:hover ul ul,
		#menungang li:hover ul ul ul,
		#menungang li:hover ul ul ul ul,
		display:none;
		left:120px;
		top:5px;
		}
			#menungang li:hover ul,
		#menungang li li:hover ul,
		#menungang li li li:hover ul,
		#menungang li li li li:hover ul,
		display:block;
				}
 </style>
